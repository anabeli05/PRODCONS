<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consumo y Producción Sostenible</title>
  <style>
    body {
      font-family: sans-serif;
      background-image: url('https://images.unsplash.com/photo-1560807707-8cc77767d783'); /* Fondo de campo */
      background-size: cover;
      background-position: center;
      margin: 0;
      padding: 0;
    }

    .cuestionario {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contenedor-cuestionario {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 0 20px rgba(0,0,0,0.15);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      width: 100%;
    }

    .preguntas {
      list-style: none;
      padding: 0;
      flex: 2;
      width: 60%;
    }

    .preguntas li {
      margin-bottom: 20px;
    }

    .preguntas label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .preguntas input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      background-color: #f3e3d9;
      border-radius: 8px;
    }

    .respuestas-box {
      background-color: #e4f6aa;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      flex: 1;
      width: 30%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .respuestas-box p {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .respuestas-box img {
      width: 80px;
    }

    .enviar{
        background-color: #e4f6aa;
        width: 100%;
        height: 9%;
        position: relative;
        top: 320px;
        left: -510px;
    }
  </style>
</head>
<body>

  <section class="cuestionario">
    <div class="contenedor-cuestionario">
      <h2>¿Qué tanto sabes del consumo y la producción sostenible?</h2>

      <ul class="preguntas">
        <li>
          <label>¿Cómo se afecta el medio ambiente?</label>
          <input type="text" placeholder="Escribe tu respuesta aquí" />
        </li>
        <li>
          <label>¿Cómo se pueden reducir los desechos?</label>
          <input type="text" placeholder="Escribe tu respuesta aquí" />
        </li>
        <li>
          <label>¿Cómo se pueden aprovechar los recursos?</label>
          <input type="text" placeholder="Escribe tu respuesta aquí" />
        </li>
        <li>
          <label>¿Cómo se pueden mejorar las condiciones de vida?</label>
          <input type="text" placeholder="Escribe tu respuesta aquí" />
        </li>
      </ul>
      <li>
        <button class="enviar"> Enviar </button>
      </li>

      <div class="respuestas-box">
        <p>Ingresa tus respuestas</p>
        <img src="https://cdn-icons-png.flaticon.com/512/4202/4202844.png" alt="Niña sonriente animada" />
      </div>
    </div>
  </section>

</body>
</html>
