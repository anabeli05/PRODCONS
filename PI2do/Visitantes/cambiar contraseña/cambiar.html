<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODCONS - Cambiar Contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="cambiar.css">
</head>
<body>
    <div class="form">
        <h1>CAMBIAR CONTRASEÑA</h1>
        <form id="formCambioContrasena">
            <div class="instrucciones">
                <p>Ingresa tu contraseña actual y tu nueva contraseña.</p>
            </div>

            <div class="buton">
                <div class="input-area">
                    <input type="password" id="currentPassword" placeholder="Contraseña Actual" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="buton">
                <div class="input-area">
                    <input type="password" id="newPassword" placeholder="Nueva Contraseña" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="buton">
                <div class="input-area">
                    <input type="password" id="confirmPassword" placeholder="Confirmar Nueva Contraseña" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <input type="submit" value="CAMBIAR CONTRASEÑA">
            
            <div class="alternar-form">
                <p><a href="login.html">Volver al inicio de sesión</a></p>
            </div>
        </form>
    </div>

    <script src="/PI2do/inicio sesion/cambiar.js"></script>
</body>
</html>
