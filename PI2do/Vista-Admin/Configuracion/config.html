<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODCONS - Configuracion</title>
    <link href="/PI2do/Vista-Admin/Configuracion/config.css" rel="stylesheet">
    <link href="/PI2do/Vista-Admin/1SideBar/sidebar.css" rel="stylesheet">

    <!--Javascrip header y barra-->
    <script src="/PI2do/Vista-Admin/1SideBar/barra-nav.js" defer></script>

    <!-- Js cambiar banderas-->
    <script src="/PI2do/Vista-Admin/Configuracion/config-bandera.js" defer></script>

</head>
<body>
    
    <header> 
        <div class="header-contenedor">
            <div class="principal"></div>
        </div>
    </header>

    <section class="logo"> 
        <div class="header_2">
            <img class="prodcons" src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/logoSinfondo.png" alt="Logo">

            <div class="admin-controls">
                <!-- Botón de búsqueda-->
                <button class="search-toggle-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>

                <!--Barra de búsqueda-->
                <div class="search-bar hidden">
                    <input type="text" placeholder="Buscar...">
                    <button class="search-close-btn">&times;</button>
                </div>

                <!--Botón de notificaciones-->
                <a href="/PI2do/Vista-Admin/Notibox/noti-box.html" class="notif-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="notif-badge">1</span>
                </a>

                <!-- Botón Admin con avatar -->
                <div class="admin-btn">
                    <span>Admin</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 11l8 3l8 -3" />
                    </svg>
                    <img src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/removebg-preview.png" alt="Admin" class="admin-avatar">
                </div>
            </div>

            <!----- sidebar ----->
            <div class="admin-sidebar" id="adminSidebar">
                <div class="sidebar-header">
                    <h3>ADMIN</h3>
                    <button class="close-sidebar">
                        <img src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/removebg-preview.png" alt="Admin" class="admin-avatar">
                    </button>
                </div>
                
                <nav class="sidebar-menu">
                    <a href="/PI2do/Vista-Admin/MisArticulos/mis-articulos.html">
                        <span>Mis Artículos</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </a>
                    
                    <a href="/PI2do/Vista-Admin/Configuracion/config.html">
                        <span>Configuración</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </a>
                    
                    <a href="/PI2do/Vista-Admin/PostPlaneados/post-planeados.html">
                        <span>Post Planeados</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </a>
                    
                    <a href="/PI2do/Vista-Admin/Estadisticas/estadisticas-adm.html">
                        <span>Estadísticas</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="20" x2="12" y2="10"/>
                            <line x1="18" y1="20" x2="18" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="16"/>
                        </svg>
                    </a>
                </nav>
                
                <div class="sidebar-footer">
                    <button class="logout-btn">Cerrar Sesión</button>
                </div>

            </div>

        </div>
    </section>

    <div class="contenedor-configuracion">
        <div class="config-titulo">
            <h1>Configuración</h1>
        </div>

        <div class="main-content">
            <div class="secciones">
                <div class="section-title">Perfil</div>
                <div class="profile-item">
                  <label for="avatarInput" class="avatar-selector">
                    <img src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/removebg-preview.png" alt="Admin" class="admin-avatar" />
                    <p>Foto de perfil</p>
                  </label>

                  <div class="nombre-container">
                    <label for="username" class="profile-label">Nombre:</label>
                    <input type="text" id="username" name="username" value="ADMIN" class="profile-name-input" />
                  </div>
                  <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display: none;" />
                  
                </div>
                
                <div class="section-title">Idioma</div>
                <div class="language-item">
                    <div class="seletor-idiomas">
                        <img id="icono-bandera" src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/espanol.png" alt="Bandera" class="icono-bandera" />
                        <select id="idiomas">
                            <option value="es" selected>Español</option>
                            <option value="en">Ingles</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="mensaje-cuadro">
                <div class="personaliza-text">Personaliza tu perfil!</div>
                <img src="/PI2do/Vista-Admin/UsuarioAdmin/img-vista-admin/chicosSaltando.png" href="XD">
            </div>
            
        </div>
        
        <div class="seccion-sesion">
            <div class="seguridad-contenido">
              <div class="section-title">Seguridad</div>

             <div class="security-item">
                 <svg xmlns="http://www.w3.org/2000/svg" class="lock-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                 </svg>
                 <a href="#" class="change-password">Cambiar Contraseña</a>
              </div>
            </div>

            <button class="logout-button">Cerrar Sesión</button>
        </div>
    </div>


</body>
</html>
