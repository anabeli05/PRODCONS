<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Administración</title>
  <link rel="stylesheet" href="/PI2do/SuperAdmin/Registro de Editores/regitro.css"/>
</head>
<body>
  <div class="background-container"><!-- AQUÍ VA TU IMAGEN DE FONDO -->

    <header class="header_2">
      <div class="logo-area">
        <img src="/PI2do/imagenes/prodcon/logoSinfondo.png" alt="Logo" class="logo" />
      </div>
      <div id="user-icon" class="user-icon">
        <img src="/PI2do/imagenes/SuperAdmin/superadminPersona.png" alt="Usuario" />
      </div>
    </header>

    <div id="sidebar" class="sidebar hidden">
      <button class="close-btn" id="close-btn">&times;</button>
      <h3>SuperAdmin<img src="/PI2do/imagenes/SuperAdmin/superadminPersona.png" alt="Admin Icon"></h3>
      <ul>
        <li><a href="/PI2do/SuperAdmin/inicioSp.html"><span>Mis Artículos</span><img src="/PI2do/imagenes/SuperAdmin/hojaSinfondo.png" alt="Artículos"></a></li>
        <li><a href="/PI2do/SuperAdmin/configuracion.html"><span>Configuración</span><img src="/PI2do/imagenes/SuperAdmin/EngranajeSinfondo.png" alt="Configuración"></a></li>
        <li><a href="/post-planeados"><span>Post Planeados</span><img src="/PI2do/imagenes/SuperAdmin/calendario.png" alt="Post Planeados"></a></li>
        <li><a href="/PI2do/SuperAdmin/vistaAdmin.html"><span>Vista de Admins</span><img src="/PI2do/imagenes/SuperAdmin/calendario.png" alt="Vista Adminis"></a></li>
        <li><a href="/PI2do/SuperAdmin/vistaAdmin.html"><span>Registrar Administrador</span><img src="/PI2do/imagenes/SuperAdmin/calendario.png" alt="Registrar Administrador"></a></li>
        <li><a href="/PI2do/SuperAdmin/estadisticaSp.html"><span>Estadísticas</span><img src="/PI2do/imagenes/SuperAdmin/tablaEstadistica.png" alt="Estadísticas"></a></li>
        <li><a href="/PI2do/inicio sesion/loginSuper.html" id="logout-btn" class="logout"><span>Cerrar Sesión</span></a></li>
      </ul>
    </div>

    <div id="overlay" class="hidden"></div>

    <div class="form-wrapper">
      <h3 class="form-title">Registrar Nuevo Administrador</h3>
      <form id="add-editor-form" class="add-editor-form">
        <label for="editor-name">Nombre:</label>
        <input type="text" id="editor-name" name="editor-name" required>

        <label for="editor-role">Rol:</label>
        <input type="text" id="editor-role" name="editor-role" required>

        <label for="editor-email">Email:</label>
        <input type="email" id="editor-email" name="editor-email" required>

        <button type="submit">Agregar Administrador</button>
        <p id="form-message" class="form-message"></p>
      </form>
    </div>

  </div>
  <script src="registroAdmin.js"></script>
</body>
</html>
