<script>
  // Activar CKEditor para los campos con clase "editor"
  CKEDITOR.replace('intro_texto');
  document.querySelectorAll('.editor').forEach(el => {
    if(el.id !== 'intro_texto') CKEDITOR.replace(el);
  });

  function agregarBloque() {
    const contenedor = document.getElementById('contenedores');
    const bloque = document.createElement('div');
    const index = contenedor.children.length;

    bloque.className = 'bloque';
    bloque.innerHTML = `
      <label>Título:</label>
      <input type="text" name="titulo_bloques[]" required>

      <label>Subtítulo:</label>
      <input type="text" name="subtitulo_bloques[]" required>

      <label>Texto:</label>
      <textarea name="texto_bloques[]" class="editor" required></textarea>

      <label>Imagen (opcional):</label>
      <input type="file" name="imagen_bloques[]" accept="image/*" multiple>

      <label>Alineación de Imagen:</label>
      <select name="alineacion_bloques[]">
        <option value="">Sin imagen</option>
        <option value="izquierda">Izquierda</option>
        <option value="derecha">Derecha</option>
      </select>
    `;
    contenedor.appendChild(bloque);

    // Activar CKEditor en el nuevo textarea
    const newTextarea = bloque.querySelector('.editor');
    CKEDITOR.replace(newTextarea);
  }

  // Validación mínima para asegurar que haya al menos dos bloques llenos
  function validarFormulario() {
    const titulos = document.querySelectorAll('input[name="titulo_bloques[]"]');
    const subtitulos = document.querySelectorAll('input[name="subtitulo_bloques[]"]');
    if (titulos.length < 2 || subtitulos.length < 2) {
      alert("Debes completar al menos dos bloques de contenido con título y subtítulo.");
      return false;
    }
    return true;
  }
</script>
